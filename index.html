<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/normalize.css">
    <title>Libreria | The Odin Project</title>
</head>

<body>
    <header class="cabecera">
        <h1 class="tituloCabecera">Bienvenido a <span>PublicRead</span></h1>
        <p class="descripcionCabecera">Sientase libre de elegir el libro que mas le guste!</p>
    </header>

    <button class="nuevo-libro">Agregar Libro</button>

    <dialog class="agregar-libro">
        <form action="" class="formulario-libro">
            <h3>Agregue los libros</h3>
            <label for="titulo">Titulo</label>
            <input type="text" name="titulo" id="titulo" placeholder="Ej: EL Señor de los Anillos">

            <label for="autor">Autor</label>
            <input type="text" id="autor" placeholder="Ej: J. R. R. Tolkien">

            <label for="descripcion">Descripción</label>
            <textarea name="descripcion" id="descripcion"
                placeholder="Escriba una breve descripcion del libro"></textarea>

            <input class="enviar" type="submit" value="Agregar">

            <button class="cerrar-formulario">Cerrar</button>
        </form>
    </dialog>

    <article class="catalogo">
        <div class="contenedorLibros"></div>
    </article>

    <dialog class="modal">
        <img src="" alt="" class="portada-modal">
        <h2 class="titulo-modal"></h2>
        <p class="autor-modal"></p>
        <p class="descripcion-modal"></p>
        <button class="cerrar-modal">Cerrar</button>
    </dialog>

    <script src="./js/script.js"></script>
</body>

</html>
